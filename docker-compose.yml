# Autotronic - Docker Compose Configuration
# Self-hosted deployment with Redis and persistent storage

version: '3.8'

services:
  # Main Autotronic Application
  autotronic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autotronic
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://${POSTGRES_USER:-autotronic}:${POSTGRES_PASSWORD:-autotronic}@postgres:5432/${POSTGRES_DB:-autotronic}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-me-in-production}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
      - postgres
    networks:
      - autotronic-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis for job queue and caching
  redis:
    image: redis:7-alpine
    container_name: autotronic-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - autotronic-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for persistent storage
  postgres:
    image: postgres:16-alpine
    container_name: autotronic-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-autotronic}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-autotronic}
      - POSTGRES_DB=${POSTGRES_DB:-autotronic}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - autotronic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autotronic}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx reverse proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: autotronic-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - autotronic
    networks:
      - autotronic-network
    profiles:
      - production

  # Watchtower for auto-updates (optional)
  watchtower:
    image: containrrr/watchtower
    container_name: autotronic-watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - autotronic-network
    profiles:
      - auto-update

networks:
  autotronic-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
